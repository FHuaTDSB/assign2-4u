<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typescript Assignment</title>
  <link rel="stylesheet" href="src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <h1>Cubic Solver</h1>
  <form class="form-container" id="cubic">
    <div class="form-child">
      <label for="a">a value:</label>
      <input type="number" name="a" id="a" class="form-field" required>
    </div>
    <div class="form-child">
      <label for="b">b value:</label>
      <input type="number" name="b" id="b" class="form-field" required>
    </div>
    <div class="form-child">
      <label for="c">c value:</label>
      <input type="number" name="c" id="c" class="form-field" required>
    </div>
    <div class="form-child">
      <label for="d">d value:</label>
      <input type="number" name="d" id="d" class="form-field" required>
    </div>
    <input type="submit" value="Solve!" class="form-submit">
  </form>
  <h3 id="equation">
    <p class="coefficient">1</p>x<sup>3</sup> + <p class="coefficient">1</p>x<sup>2</sup> + <p class="coefficient">1</p>
    x + <p class="coefficient">1</p> = 0
  </h3>
  <div>
    <table id="data">
      <tr>
        <td class="table-subtitle">p</td>
        <td class="table-value">0</td>
      </tr>
      <tr>
        <td class="table-subtitle">q</td>
        <td class="table-value">0</td>
      </tr>
      <tr>
        <td class="table-subtitle">Discriminant</td>
        <td class="table-value">0</td>
      </tr>
    </table>
    <table id="solutions">
      <tr>
        <th class="table-subtitle">Values</th>
        <th>x</th>
        <th>y</th>
      </tr>
      <tr>
        <td class="table-subtitle">Root 1</td>
        <td class="table-value">0</td>
        <td>0</td>
      </tr>
      <tr>
        <td class="table-subtitle">Root 2</td>
        <td class="table-value">0</td>
        <td>0</td>
      </tr>
      <tr>
        <td class="table-subtitle">Root 3</td>
        <td class="table-value">0</td>
        <td>0</td>
      </tr>
    </table>
  </div>
  <script defer src="src/main.ts"></script>
</body>

</html>
